spring.application.name=GoodFiction
spring.datasource.url=jdbc:postgresql://localhost:5432/goodfiction
spring.datasource.username=postgres
spring.datasource.password=neroforte
spring.datasource.driver-class-name=org.postgresql.Driver

spring.ai.google.genai.api-key=${GeminiAPIKey}

spring.ai.google.genai.project-id=good-fiction-app
spring.ai.google.genai.location=us-central1

spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.2

google.books.api-key=${GoodFictionAPiKey}
google.books.base-url=https://www.googleapis.com/books/v1/volumes

spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml