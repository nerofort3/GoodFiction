version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: goodfiction-db
    environment:
      POSTGRES_DB: goodfiction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: neroforte
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
